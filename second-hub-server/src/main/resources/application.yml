server:
  port: 8080

spring:
  application:
    name: second-hub-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/db_second_hub?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 4
      timeout: 3s

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  # 生产环境改为false
  production: false

app:
  jwt:
    secret: secondHubsecondHubsecondHubsecondHub
    expire-seconds: 86400
    issuer: second-hub
  storage:
    type: local
    local-root: uploads
    local-prefix: /uploads/
    image-host: http://127.0.0.1:8080
  wechat:
    appid: wxaa51d047f8b7ef3c
    appsecret: 5df0f6c2df21d35508665cb8aa444cc8
